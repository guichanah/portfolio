<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANULCHAE Footer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .footer {
            width: 100%;
            background: #222;
            color: white;
            position: fixed;
            bottom: 0;
            left: 0;
            height: 250px;
            overflow: hidden;
            transition: height 0.3s ease-in-out;
        }
        .footer.expanded {
            height: 550px;
        }
        .footer-content {
            padding: 20px;
        }
        .toggle-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            color: black;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="footer" id="footer">
        <button class="toggle-button" id="toggleButton">펼치기</button>
        <div class="footer-content">
            <h2>HANULCHAE</h2>
            <p>대표자: 김정애</p>
            <p>주소: 전라북도 전주시 덕진구 백제대로 572 4층</p>
            <p>사업자번호: 418-90-44549</p>
            <p>통신판매업번호: 제 2010-전주덕진-121호</p>
            <p>관광사업자등록: 일반여행업 2018-000049호(전주시청)</p>
            <div class="expanded-content" style="display: none;">
                <h3>Guide</h3>
                <p>이용약관 | 개인정보처리방침 | 이용안내 | 자주묻는 질문</p>
                <h3>Customer Center</h3>
                <p>063)276-2381</p>
                <p>평일 09:00-18:00 점심 12:00 - 13:00</p>
                <p>(토,일 공휴일 휴무)</p>
                <h3>SNS</h3>
                <p>인스타그램 | 페이스북 | 유튜브 | 핀터레스트</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("toggleButton").addEventListener("click", function() {
            var footer = document.getElementById("footer");
            var expandedContent = document.querySelector(".expanded-content");
            if (footer.classList.contains("expanded")) {
                footer.classList.remove("expanded");
                expandedContent.style.display = "none";
                this.textContent = "펼치기";
            } else {
                footer.classList.add("expanded");
                expandedContent.style.display = "block";
                this.textContent = "접기";
            }
        });
    </script>
</body>
</html>
